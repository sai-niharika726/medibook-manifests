apiVersion: apps/v1
kind: Deployment
metadata:
  name: medibook
  namespace: mb
  labels:
    app: Healthcare
spec:
  replicas: 2
  selector:
    matchLabels:
      app: Healthcare
  template:
    metadata:
      labels:
        app: Healthcare
    spec:
      containers:
        - name: c1
          image: bsainiharika/medibook:v1
          ports:
            - containerPort: 5000
          env:
            - name: DATABASE_URL
              valueFrom:
                configMapKeyRef:
                  name: mb-config
                  key: DATABASE_URL
            - name: JWT_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: mb-secret
                  key: JWT_SECRET_KEY
          resources:
            requests:
               cpu: "100m"
               memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"

